name: Skill Quality Test

on:
  push:
    branches: [main, develop]
    paths:
      - 'skills/**'
      - 'tests/**'
      - 'package.json'
  pull_request:
    branches: [main]
    paths:
      - 'skills/**'
      - 'tests/**'
      - 'package.json'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Test mode'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - structure
          - quality

permissions:
  contents: read
  pull-requests: write

jobs:
  # 结构测试 - 使用现有 shell 脚本
  structure-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make scripts executable
        run: chmod +x scripts/test-skill.sh

      - name: Run structure tests
        run: ./scripts/test-skill.sh

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: structure-test-results
          path: |
            test-results/
          retention-days: 7

  # 质量测试 - 使用 promptfoo
  quality-test:
    runs-on: ubuntu-latest
    needs: structure-test
    if: github.event.inputs.mode != 'structure'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run promptfoo quality tests
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
        run: |
          npx promptfoo eval \
            --config tests/promptfooconfig.yaml \
            --output test-results/quality-report.html \
            --max-concurrency 5

      - name: Upload quality test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-test-results
          path: |
            test-results/
          retention-days: 7

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'test-results/results.json';

            let comment = '## 🧪 Skill 质量测试结果\n\n';

            if (fs.existsSync(path)) {
              const results = JSON.parse(fs.readFileSync(path, 'utf8'));

              // 统计通过/失败
              const total = results.results?.length || 0;
              const passed = results.results?.filter(r => r.success).length || 0;
              const failed = total - passed;

              comment += `| 指标 | 结果 |\n`;
              comment += `|------|------|\n`;
              comment += `| 总测试数 | ${total} |\n`;
              comment += `| ✅ 通过 | ${passed} |\n`;
              comment += `| ❌ 失败 | ${failed} |\n`;
              comment += `| 通过率 | ${total > 0 ? ((passed/total)*100).toFixed(1) : 0}% |\n\n`;

              if (failed > 0) {
                comment += '### ⚠️ 失败的测试\n\n';
                results.results?.filter(r => !r.success).forEach(r => {
                  comment += `- **${r.description || r.testCase?.description || 'Unknown'}**\n`;
                });
              }
            } else {
              comment += '测试结果文件未生成。请检查工作流日志。\n';
            }

            comment += '\n---\n*由 GitHub Actions 自动生成*';

            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: comment
            });

  # 质量门禁 - 检查通过率
  quality-gate:
    runs-on: ubuntu-latest
    needs: [structure-test, quality-test]
    if: always() && github.event.inputs.mode != 'structure'
    steps:
      - name: Download quality test results
        uses: actions/download-artifact@v4
        with:
          name: quality-test-results
          path: test-results/

      - name: Check quality gate
        id: quality-check
        run: |
          if [ -f test-results/results.json ]; then
            # 提取通过率
            PASS_RATE=$(cat test-results/results.json | jq -r '
              (.results | map(select(.success)) | length) /
              (.results | length) * 100
            ' 2>/dev/null || echo "0")

            echo "pass_rate=$PASS_RATE" >> $GITHUB_OUTPUT
            echo "📊 通过率: $PASS_RATE%"

            # 质量门禁：95% 通过率
            if (( $(echo "$PASS_RATE >= 95" | bc -l) )); then
              echo "✅ 质量门禁通过"
              echo "gate_passed=true" >> $GITHUB_OUTPUT
            else
              echo "❌ 质量门禁未通过（需要 ≥95%）"
              echo "gate_passed=false" >> $GITHUB_OUTPUT
              exit 1
            fi
          else
            echo "⚠️ 未找到测试结果文件"
            echo "gate_passed=unknown" >> $GITHUB_OUTPUT
          fi

      - name: Quality gate status
        if: failure()
        run: |
          echo "::error::质量门禁未通过，请检查测试结果并修复问题"
